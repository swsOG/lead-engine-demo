<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lead Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="bg-neutral-950 text-neutral-100">
    <main class="mx-auto min-h-screen max-w-7xl px-5 py-8" data-job-id="{{ job_id }}" data-missing="{{ 'true' if missing else 'false' }}">
      <div class="mb-6 flex flex-col gap-4 border-b border-neutral-800 pb-5 md:flex-row md:items-end md:justify-between">
        <div>
          <a href="/" class="text-sm text-amber-300 hover:text-amber-200">New search</a>
          <a href="/approvals" class="ml-4 text-sm text-amber-300 hover:text-amber-200">Approval queue</a>
          <h1 class="mt-2 text-3xl font-semibold">Ranked leads</h1>
          <div id="jobBadges" class="mt-3 flex flex-wrap gap-2"></div>
          <p id="statusMessage" class="mt-2 text-neutral-300">Starting seed demo job...</p>
        </div>
        <div class="w-full md:w-80">
          <div class="h-3 overflow-hidden rounded-full bg-neutral-800">
            <div id="progressBar" class="h-full w-[5%] rounded-full bg-amber-300 transition-all"></div>
          </div>
          <p id="progressText" class="mt-2 text-right text-sm text-neutral-400">5%</p>
        </div>
      </div>

      <section id="errorBox" class="hidden rounded-md border border-red-500/40 bg-red-950/40 p-4 text-red-100"></section>
      <section id="resultSourceBanner" class="mb-6 hidden rounded-md border p-4"></section>
      <section id="activityPanel" class="mb-6 hidden rounded-md border border-neutral-800 bg-neutral-900 p-4"></section>
      <section id="leadSummary" class="mb-6 grid gap-3 text-sm md:grid-cols-5"></section>
      <section id="contextBox" class="mb-6 grid gap-3 text-sm text-neutral-300 md:grid-cols-2"></section>
      <section id="resultsList" class="grid gap-4"></section>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
